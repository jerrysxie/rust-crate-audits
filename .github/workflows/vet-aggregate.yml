# This workflow runs daily to aggregate the audits from other repositories
# in `sources.list` and updates the `audits.toml` file.
name: vet-aggregate
on:
  workflow_dispatch:
  schedule:
    # Once a day at midnight UTC
    - cron:  '0 0 * * *'

concurrency:
  group: vet-aggregate
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  aggregate:
    name: Aggregate Dependencies
    runs-on: ubuntu-latest
    env:
      CARGO_VET_VERSION: 0.10.1
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: rustup update stable && rustup default stable
    - uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/cargo-vet
        key: cargo-vet-bin-${{ env.CARGO_VET_VERSION }}
    - name: Add the tool cache directory to the search path
      run: echo "${{ runner.tool_cache }}/cargo-vet/bin" >> $GITHUB_PATH
    - name: Ensure that the tool cache is populated with the cargo-vet binary
      run: cargo install --root ${{ runner.tool_cache }}/cargo-vet --version ${{ env.CARGO_VET_VERSION }} cargo-vet
    - name: Invoke cargo-vet aggregate
      run: cargo vet aggregate sources.list --output-file audits.toml
    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if git diff --quiet audits.toml; then
          echo "No changes to audits.toml, skipping PR creation."
          exit 0
        fi

        # Fixed branch name so subsequent runs update the same PR
        # rather than creating duplicates. The concurrency group above
        # prevents overlapping runs.
        BRANCH="automated/vet-aggregate"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git fetch origin "$BRANCH" || true
        git checkout -B "$BRANCH"
        git add audits.toml
        git commit -m "Aggregate new audits"
        git push --force-with-lease origin "$BRANCH"

        # Update existing PR or create a new one
        EXISTING_PR=$(gh pr list --head "${GITHUB_REPOSITORY_OWNER}:$BRANCH" --json number --jq '.[0].number // empty')
        if [ -n "$EXISTING_PR" ]; then
          echo "Updated existing PR #$EXISTING_PR"
        else
          gh pr create \
            --base main \
            --head "${GITHUB_REPOSITORY_OWNER}:$BRANCH" \
            --title "Aggregate new audits" \
            --body "Automated aggregation of cargo-vet audits from upstream repositories listed in \`sources.list\`."
        fi
